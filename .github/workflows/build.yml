name: Build Windows
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --name transfert.exe main.py
      - uses: actions/upload-artifact@v4
        with:
          name: Transfert-Windows
          path: dist/transfert.exe
